version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gov_broker_pg
    env_file:
      - ./server/.env
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: node:20-alpine
    container_name: gov_broker_server
    working_dir: /app
    command: sh -c "export DATABASE_URL=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@postgres:5432/$POSTGRES_DB && npm install && npm run dev"
    volumes:
      - ./server:/app
    ports:
      - '4000:4000'
    env_file:
      - ./server/.env
    depends_on:
      postgres:
        condition: service_healthy

  client:
    image: node:20-alpine
    container_name: gov_broker_client
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./client:/app
    ports:
      - '3000:3000'
    depends_on:
      - server

volumes:
  pgdata:
