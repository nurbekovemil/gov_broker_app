version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gov_broker_pg
    environment:
      POSTGRES_DB: gov_broker
      POSTGRES_USER: gov_broker
      POSTGRES_PASSWORD: gov_broker_pass
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gov_broker']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
